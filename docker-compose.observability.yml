services:
  backend:
    environment:
      MANAGEMENT_PORT: 8082
      MANAGEMENT_TRACING_ENABLED: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_SERVICE_NAME: hms-backend
      HMS_STRUCTURED_LOGGING_ENABLED: "true"
    expose:
      - "8082"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infra/observability/otel-collector.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - tempo
    ports:
      - "${HMS_OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${HMS_OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${HMS_OTEL_METRICS_HOST_PORT:-8889}:8889"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
      - otel-collector
    ports:
      - "${HMS_PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${HMS_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${HMS_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    ports:
      - "${HMS_GRAFANA_HOST_PORT:-3001}:3000"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "${HMS_TEMPO_HOST_PORT:-3200}:3200"

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./infra/observability/loki.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    ports:
      - "${HMS_LOKI_HOST_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./infra/observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
