# Development profile — activate with: --spring.profiles.active=dev
# All external integrations disabled for local development.

logging:
  level:
    com.hospital: DEBUG
    org.springframework.security: DEBUG

integration:
  gmail:
    enabled: false

spring:
  flyway:
    clean-disabled: false

hms:
  seed:
    non-billing-demo:
      enabled: ${HMS_NON_BILLING_DEMO_SEED_ENABLED:true}
