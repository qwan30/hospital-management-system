# Development profile — activate with: --spring.profiles.active=dev
# All external integrations disabled for local development.

logging:
  level:
    com.hospital: DEBUG
    org.springframework.security: DEBUG

integration:
  gmail:
    enabled: false

spring:
  datasource:
    password: ${POSTGRES_PASSWORD}
  flyway:
    clean-disabled: false

server:
  port: 8081

security:
  http:
    allow-credentials: ${HMS_ALLOW_CREDENTIALS:true}
  jwt:
    secret: ${JWT_SECRET}
  patient-identifier:
    secret: ${PATIENT_IDENTIFIER_SECRET}

hms:
  seed:
    non-billing-demo:
      enabled: ${HMS_NON_BILLING_DEMO_SEED_ENABLED:true}
    release-demo:
      enabled: ${HMS_RELEASE_DEMO_SEED_ENABLED:false}
