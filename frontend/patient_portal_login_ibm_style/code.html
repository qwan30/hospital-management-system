<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Patient Portal Login | MEDCORE OS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            font-family: 'Public Sans', sans-serif;
        }
        /* Hide scrollbars for a cleaner, monolithic look */
        ::-webkit-scrollbar {
            display: none;
        }
        -ms-overflow-style: none;
        scrollbar-width: none;
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb59d",
                        "on-primary-fixed-variant": "#003da9",
                        "on-tertiary-fixed-variant": "#832700",
                        "on-surface-variant": "#424656",
                        "on-primary-container": "#f3f3ff",
                        "surface-container-high": "#eae7e7",
                        "primary-fixed": "#dbe1ff",
                        "surface-variant": "#e5e2e1",
                        "on-tertiary-fixed": "#390c00",
                        "inverse-surface": "#313030",
                        "outline": "#737687",
                        "on-tertiary": "#ffffff",
                        "surface": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed": "#ffdbd0",
                        "surface-bright": "#fcf9f8",
                        "secondary-container": "#9db3ff",
                        "on-secondary-fixed-variant": "#2a4387",
                        "error-container": "#ffdad6",
                        "surface-tint": "#0052dd",
                        "on-secondary-container": "#2b4388",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "on-background": "#1c1b1b",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#dbe1ff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fff1ed",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f3f0ef",
                        "primary-container": "#0f62fe",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#004ccd",
                        "background": "#fcf9f8",
                        "surface-container-low": "#f6f3f2",
                        "secondary-fixed-dim": "#b4c5ff",
                        "secondary": "#445ba1",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container": "#f0edec",
                        "on-secondary-fixed": "#00174c",
                        "tertiary": "#9e3100",
                        "outline-variant": "#c3c6d8",
                        "on-primary-fixed": "#00174c",
                        "tertiary-container": "#c84000",
                        "surface-dim": "#dcd9d9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface flex min-h-screen items-center justify-center overflow-hidden">
<!-- Portal Themed Background Texture -->
<div class="absolute inset-0 z-0 overflow-hidden">
<img alt="Modern medical facility interior with clinical clean lines and soft daylight" class="w-full h-full object-cover opacity-15 grayscale" data-alt="wide shot of a clean modern hospital atrium with glass walls minimalist white architecture and soft cool natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvBHEq86VCvjE9waCtk89foGtvC7hJUwiD699_L1LLP2BkubUqc1QAL8vPoo2a47FKBM7pfgWmgV-E5LEc0MNt83CYrEBSJXMcPxqoJDYIKLFHdJV2sSaNAA1Ar8JaCH7x5dzvtelyGgTxazCzT5_YItOUqbxhSnAGpyF3fu18k5gflhOpFfryg4YmjEtJMAzaYV-D_5FBRfE8faJnj5dMIgVj4HoAS5iCIGiFdbwk6yAUJVroHuFMo4AsPlmnCvwZrVu7sqTyOg"/>
<div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/90 to-surface-container-low/50"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[420px] flex flex-col gap-12 p-4 md:p-0">
<!-- Brand Header: Literal string from Shared JSON -->
<header class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<span class="bg-primary p-1">
<span class="material-symbols-outlined text-white text-lg" data-icon="medical_services">medical_services</span>
</span>
<h1 class="text-xl font-bold tracking-widest text-neutral-900 uppercase">MEDCORE OS</h1>
</div>
<p class="text-[3.5rem] leading-[0.9] font-light tracking-tighter text-on-surface">Patient Portal</p>
</header>
<!-- Login Container: IBM Carbon Stylized Monolith -->
<section class="bg-surface-container-lowest border-t-4 border-primary p-12 flex flex-col gap-10">
<div class="flex flex-col gap-2">
<h2 class="text-sm font-semibold uppercase tracking-[0.2em] text-outline">Log in</h2>
</div>
<form class="flex flex-col gap-8">
<!-- Email Field -->
<div class="group flex flex-col gap-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant py-4 px-0 placeholder:text-outline/40 focus:ring-0 focus:border-primary focus:bg-surface-container transition-all duration-200" id="email" placeholder="name@hospital.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group flex flex-col gap-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant py-4 px-0 placeholder:text-outline/40 focus:ring-0 focus:border-primary focus:bg-surface-container transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login CTA -->
<button class="group relative flex items-center justify-between w-full bg-primary-container text-white py-5 px-8 font-semibold transition-all duration-200 hover:bg-primary active:translate-y-[2px]" type="submit">
<span class="tracking-widest uppercase text-sm">Log in</span>
<span class="material-symbols-outlined transition-transform duration-200 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<footer class="flex flex-col gap-4">
<div class="h-[1px] w-full bg-outline-variant opacity-20"></div>
<div class="flex justify-between items-center">
<a class="text-xs font-semibold text-primary hover:underline underline-offset-4 tracking-wide" href="#">
                        Forgot password?
                    </a>
<a class="text-xs font-semibold text-on-surface-variant hover:text-on-surface tracking-wide flex items-center gap-1 group" href="#">
                        Need access? <span class="text-primary group-hover:underline underline-offset-4">Claim portal</span>
</a>
</div>
</footer>
</section>
<!-- Auxiliary Branding -->
<div class="flex items-center justify-between opacity-40">
<div class="flex flex-col">
<span class="text-[10px] font-black uppercase tracking-[0.3em]">HOSPITAL ADMIN</span>
<span class="text-[8px] font-medium tracking-widest">V.2.4.0-STABLE</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-sm" data-icon="security">security</span>
<span class="material-symbols-outlined text-sm" data-icon="language">language</span>
</div>
</div>
</main>
<!-- Floating Technical Metadata (Architectural Flourish) -->
<div class="fixed bottom-8 left-8 hidden lg:block">
<div class="flex flex-col gap-1 border-l border-outline-variant pl-4">
<span class="text-[10px] font-bold text-outline uppercase tracking-widest">System Status</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 bg-primary"></div>
<span class="text-[10px] font-medium text-on-surface-variant">OPERATIONAL // NODE_S7</span>
</div>
</div>
</div>
<div class="fixed top-8 right-8 hidden lg:block">
<button class="bg-surface-container-high px-4 py-2 flex items-center gap-3 hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="help">help</span>
<span class="text-[10px] font-bold uppercase tracking-[0.2em]">Support</span>
</button>
</div>
</body></html>
