<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Login | HOSPITAL CORE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#b4c5ff",
                    "surface": "#fcf9f8",
                    "tertiary-fixed": "#ffdbd0",
                    "on-tertiary-fixed-variant": "#832700",
                    "primary-container": "#0f62fe",
                    "on-background": "#1c1b1b",
                    "on-secondary-fixed": "#00174c",
                    "inverse-on-surface": "#f3f0ef",
                    "surface-container-high": "#eae7e7",
                    "primary-fixed": "#dbe1ff",
                    "on-primary-fixed": "#00174c",
                    "on-secondary-fixed-variant": "#2a4387",
                    "tertiary": "#9e3100",
                    "surface-container": "#f0edec",
                    "outline-variant": "#c3c6d8",
                    "on-tertiary-container": "#fff1ed",
                    "primary-fixed-dim": "#b4c5ff",
                    "tertiary-container": "#c84000",
                    "surface-bright": "#fcf9f8",
                    "surface-container-highest": "#e5e2e1",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#f3f3ff",
                    "background": "#fcf9f8",
                    "secondary-fixed": "#dbe1ff",
                    "surface-container-low": "#f6f3f2",
                    "secondary-container": "#9db3ff",
                    "primary": "#004ccd",
                    "outline": "#737687",
                    "on-primary-fixed-variant": "#003da9",
                    "surface-variant": "#e5e2e1",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "secondary": "#445ba1",
                    "surface-dim": "#dcd9d9",
                    "inverse-surface": "#313030",
                    "on-surface": "#1c1b1b",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb59d",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#2b4388",
                    "on-tertiary-fixed": "#390c00",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#0052dd",
                    "secondary-fixed-dim": "#b4c5ff",
                    "on-surface-variant": "#424656"
            },
            "borderRadius": {
                    "DEFAULT": "0px",
                    "lg": "0px",
                    "xl": "0px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Public Sans"],
                    "body": ["Public Sans"],
                    "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom spacing for IBM style inputs */
        .ibm-input-container {
            background-color: #f4f4f4; /* Gray 10 equivalent */
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen overflow-x-hidden">
<!-- TopNavBar Suppression: Transactions page (Login) -->
<main class="flex-grow flex items-center justify-center p-8">
<div class="w-[420px] bg-surface-container-lowest p-8 flex flex-col gap-10">
<!-- Logo/Identity Area -->
<header class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[20px]" data-icon="clinical_notes">clinical_notes</span>
</div>
<span class="text-[12px] font-semibold tracking-[1px] text-primary uppercase">HOSPITAL CORE</span>
</div>
<h1 class="text-[28px] font-semibold tracking-[-0.02em] text-on-surface">Staff Login</h1>
<p class="text-[14px] tracking-[0.16px] text-on-surface-variant">Enter your clinical credentials to access the suite.</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-8">
<!-- User ID Field -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-semibold tracking-[0.16px] text-on-surface-variant">Staff ID</label>
<div class="ibm-input-container border-b-2 border-outline h-[40px] flex items-center px-4 transition-all duration-150 focus-within:border-primary-container">
<input class="bg-transparent border-none w-full text-[14px] tracking-[0.16px] text-on-surface placeholder:text-outline focus:ring-0 px-0" placeholder="e.g. HMS-8829" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<label class="text-[12px] font-semibold tracking-[0.16px] text-on-surface-variant">Password</label>
<a class="text-[12px] text-primary font-medium hover:underline" href="#">Forgot password?</a>
</div>
<div class="ibm-input-container border-b-2 border-outline h-[40px] flex items-center px-4 transition-all duration-150 focus-within:border-primary-container">
<input class="bg-transparent border-none w-full text-[14px] tracking-[0.16px] text-on-surface placeholder:text-outline focus:ring-0 px-0" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer text-[18px]" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="flex flex-col gap-4 mt-4">
<button class="w-full h-[48px] bg-primary-container text-on-primary text-[14px] font-semibold flex items-center justify-between px-4 transition-all duration-150 hover:bg-primary active:scale-[0.98]" type="submit">
<span>Log in to Clinical Suite</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center gap-4">
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
<span class="text-[11px] font-semibold uppercase tracking-widest text-outline">Emergency Access</span>
<div class="h-[1px] flex-grow bg-surface-container-high"></div>
</div>
<button class="w-full h-[48px] bg-surface-container-low text-on-surface text-[14px] font-semibold flex items-center justify-between px-4 hover:bg-surface-container-high transition-colors" type="button">
<span>One-Time Emergency Code</span>
<span class="material-symbols-outlined" data-icon="emergency">emergency</span>
</button>
</div>
</form>
<!-- Metadata Footer -->
<footer class="flex flex-col gap-6 pt-6">
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container p-4">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">Status</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-[#24a148]"></div>
<span class="text-[12px] font-semibold">Systems Nominal</span>
</div>
</div>
<div class="bg-surface-container p-4">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">Version</span>
<span class="text-[12px] font-semibold">v4.2.0-Core</span>
</div>
</div>
</footer>
</div>
</main>
<!-- Shared Footer Component -->
<footer class="bg-[#161616] text-white flex items-center justify-between px-8 w-full h-[48px] mt-auto">
<div class="flex items-center gap-6">
<span class="text-[11px] font-semibold uppercase tracking-widest text-white">© 2024 HOSPITAL MANAGEMENT SYSTEM | ARCHITECTURAL PRECISION</span>
</div>
<div class="flex items-center gap-8">
<a class="text-[11px] font-semibold uppercase tracking-widest text-gray-500 hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="text-[11px] font-semibold uppercase tracking-widest text-gray-500 hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="text-[11px] font-semibold uppercase tracking-widest text-gray-500 hover:text-white transition-colors" href="#">Security Audit</a>
</div>
</footer>
</body></html>
