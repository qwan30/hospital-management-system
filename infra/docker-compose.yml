services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
      POSTGRES_USER: ${POSTGRES_USER:-hospital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${HMS_POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospital_user} -d ${POSTGRES_DB:-hospital_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/tranhquan099-commits/hospital-management-system/backend:latest
    build:
      context: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
      POSTGRES_USER: ${POSTGRES_USER:-hospital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PATIENT_IDENTIFIER_SECRET: ${PATIENT_IDENTIFIER_SECRET}
      SERVER_PORT: 8081
      HMS_ALLOW_CREDENTIALS: "true"
      HMS_ALLOWED_ORIGIN_PRIMARY: ${HMS_ALLOWED_ORIGIN_PRIMARY:-http://localhost:3000}
      HMS_ALLOWED_ORIGIN_SECONDARY: ${HMS_ALLOWED_ORIGIN_SECONDARY:-http://localhost:${HMS_FRONTEND_HOST_PORT:-3000}}
      HMS_PUBLIC_RATE_LIMIT_PER_MINUTE: ${HMS_PUBLIC_RATE_LIMIT_PER_MINUTE:-30}
      HMS_RELEASE_DEMO_SEED_ENABLED: ${HMS_RELEASE_DEMO_SEED_ENABLED:-false}
      HMS_RELEASE_DEMO_FUTURE_SLOT_DAYS: ${HMS_RELEASE_DEMO_FUTURE_SLOT_DAYS:-14}
      HMS_RELEASE_DEMO_TARGET_PATIENTS: ${HMS_RELEASE_DEMO_TARGET_PATIENTS:-8}
      HMS_RELEASE_DEMO_TARGET_APPOINTMENTS: ${HMS_RELEASE_DEMO_TARGET_APPOINTMENTS:-12}
      HMS_RELEASE_DEMO_TARGET_INVENTORY_ITEMS: ${HMS_RELEASE_DEMO_TARGET_INVENTORY_ITEMS:-8}
      HMS_RELEASE_DEMO_TARGET_AUDIT_LOGS: ${HMS_RELEASE_DEMO_TARGET_AUDIT_LOGS:-16}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HMS_BACKEND_HOST_PORT:-8081}:8081"

  frontend:
    image: ghcr.io/tranhquan099-commits/hospital-management-system/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081/api/v1}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081/api/v1}
    depends_on:
      - backend
    ports:
      - "${HMS_FRONTEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:3000 > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
