global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: hms-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8082"]
        labels:
          service: hms-backend

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
