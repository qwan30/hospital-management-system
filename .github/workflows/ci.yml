name: HMS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: Backend ─────────────────────────────────────────────
  backend-test:
    name: Backend Maven tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests (compile + unit tests, all modules)
        run: mvn -B test

  # ── Job 2: Frontend ────────────────────────────────────────────
  frontend-test:
    name: Frontend lint, test, build & E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      # ── Playwright browser cache ──
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          PW=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")
          echo "version=$PW" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser (chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # ── Next.js build cache ──
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/src/**', 'web/public/**', 'web/*.ts', 'web/*.js', 'web/*.json', 'web/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      # ── Quality gates ──
      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:unit:coverage

      - name: Production build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8081/api/v1
        run: npm run build

      - name: E2E tests (Playwright, Chromium)
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8081/api/v1
        run: npm run test:e2e:ci

      # ── Artifacts ──
      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 7

  # ── Job 3: Docker images (non-PR only, depends on tests) ───────
  docker-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test, frontend-test]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8081/api/v1
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
