name: Scheduled Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-review:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit
        working-directory: web
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: OWASP Dependency Check (Maven)
        working-directory: backend
        run: >-
          mvn -B org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=7
          -Dformat=HTML
        continue-on-error: true

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          if-no-files-found: ignore
          retention-days: 14

  secret-scan:
    name: Secret detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  container-scan:
    name: Scan published container images
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/${{ github.repository }}/backend:latest
          - ghcr.io/${{ github.repository }}/frontend:latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-scheduled.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-scheduled.sarif
          category: trivy-scheduled

  scan-summary:
    name: Security scan summary
    runs-on: ubuntu-latest
    needs: [dependency-review, secret-scan, container-scan]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Detection | ${{ needs.secret-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📋 [View full security alerts](${{ github.server_url }}/${{ github.repository }}/security)" >> "$GITHUB_STEP_SUMMARY"
