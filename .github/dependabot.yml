version: 2
updates:
  # ── npm (frontend) ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "@playwright/test"
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      eslint:
        patterns:
          - "eslint"
          - "eslint-config-next"
          - "@eslint/*"
      nextjs:
        patterns:
          - "next"
          - "@next/*"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # ── Maven (backend) ─────────────────────────────────────────────
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
      testcontainers:
        patterns:
          - "org.testcontainers:*"
      jjwt:
        patterns:
          - "io.jsonwebtoken:*"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci-deps)"
      include: "scope"
